---
- name: 'RedHat | Configure the repository and install the NGINX package'
  become: true
  block:
    - name: 'RedHat | Ensure the dependencies are installed'
      ansible.builtin.package:
        name:
          - 'ca-certificates'
          - 'yum-utils'
        state: 'present'

    - name: 'RedHat | Add the NGINX repository'
      ansible.builtin.template:
        src: 'nginx.repo.j2'
        dest: '{{ __nginx_repository_file }}'
        owner: 'root'
        group: 'root'
        mode: 0644

    - name: 'RedHat | Install the NGINX package'
      ansible.builtin.yum:
        name: '{{ __nginx_package }}'
        allow_downgrade: true
        update_cache: true
        state: "{{ (nginx_setup == 'upgrade') | ternary('latest', 'present') }}"
      ignore_errors: '{{ ansible_check_mode }}'
